# =============================================================================
# Render Blueprint — Infrastructure-as-Code for deploying to Render.com
# =============================================================================
# This file defines the Ghost Chat web service.
# Redis is shared with the existing 2goi-redis instance (free tier limit: 1).
# All Ghost Chat keys are prefixed with "gc:" to avoid collisions.
#
# To deploy: Render Dashboard → New + → Blueprint → Connect GitHub repo
# =============================================================================

services:
  # ---- Web Service: Node.js + React (single container) ----
  - type: web
    name: ghost-chat
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      # Shared Redis from 2goi project (set manually in Render dashboard)
      - key: REDIS_URL
        fromService:
          name: 2goi-redis
          type: redis
          property: connectionString

      # Public config values
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGINS
        value: https://badri.online,https://ghost-chat.onrender.com

    healthCheckPath: /api/health
    autoDeploy: true
